<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Александр Волков — Фотография</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="/shared.css">
</head>
<body>

<!-- ШАПКА -->
<header class="site-header">
  <a href="/" class="back-btn visible" id="back-btn" onclick="goBack();return false;">Вернуться</a>
  <nav class="section-nav" id="section-nav">
    <a href="/projects">Проекты</a>
    <a href="/photo">Фотография</a>
    <a href="/painting">Картины</a>
    <a href="/about">Об авторе</a>
    <a href="/contacts">Контакты</a>
  </nav>
  <button class="mobile-nav-toggle" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="page-wrap">
<div id="section-photo" class="section-page standalone">
  <div class="section-logo-wrap">
    <img src="/logo.png" class="section-logo" alt="logo" onclick="showHome()">
    <h2 class="section-title">&#1060;&#1086;&#1090;&#1086;&#1075;&#1088;&#1072;&#1092;&#1080;&#1103;</h2>
  </div>
  <div class="section-divider"></div>

  <!-- Список карточек подборок -->
  <div id="photo-albums-list">
    <div class="admin-bar">
      <button class="admin-btn" onclick="addPhotoAlbum()">+ &#1087;&#1086;&#1076;&#1073;&#1086;&#1088;&#1082;&#1072;</button>
    </div>
    <div class="projects-grid" id="photo-albums-grid">
      <!-- Карточки Люди и Пространства рендерятся через JS -->
    </div>
  </div>

  <!-- Детальный вид подборки (аналог project-detail-view) -->
  <div id="photo-album-detail" class="project-view">
    <button class="admin-btn" onclick="closePhotoAlbum()" style="margin-bottom:24px;">&#8592; &#1042;&#1089;&#1077; &#1087;&#1086;&#1076;&#1073;&#1086;&#1088;&#1082;&#1080;</button>
    <div class="project-view-title editable" id="photo-album-title" contenteditable="false" spellcheck="false"></div>
    <div class="project-desc editable" id="photo-album-desc" contenteditable="false" spellcheck="false" placeholder="&#1054;&#1087;&#1080;&#1089;&#1072;&#1085;&#1080;&#1077;..."></div>
    <div class="admin-bar">
      <button class="admin-btn" onclick="addInnerItem('photo-album-gallery','photo-album')">+ &#1044;&#1086;&#1073;&#1072;&#1074;&#1080;&#1090;&#1100; &#1092;&#1086;&#1090;&#1086;</button>
    </div>
    <div class="inner-gallery" id="photo-album-gallery"></div>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-copy">&copy; &#1040;&#1083;&#1077;&#1082;&#1089;&#1072;&#1085;&#1076;&#1088; &#1042;&#1086;&#1083;&#1082;&#1086;&#1074;. &#1042;&#1089;&#1077; &#1087;&#1088;&#1072;&#1074;&#1072; &#1079;&#1072;&#1097;&#1080;&#1097;&#1077;&#1085;&#1099;.</span>
</footer>
</div>

<div class="modal-overlay" id="password-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-label">&#1044;&#1086;&#1089;&#1090;&#1091;&#1087; &#1082; &#1088;&#1077;&#1076;&#1072;&#1082;&#1090;&#1086;&#1088;&#1091;</div>
    <input class="modal-input" type="password" id="password-input" placeholder="&#1055;&#1072;&#1088;&#1086;&#1083;&#1100;" onkeydown="if(event.key==='Enter')submitPassword()">
    <div class="modal-error" id="password-error">&#1053;&#1077;&#1074;&#1077;&#1088;&#1085;&#1099;&#1081; &#1087;&#1072;&#1088;&#1086;&#1083;&#1100;</div>
    <div class="modal-btns">
      <button class="modal-ok" onclick="submitPassword()">&#1042;&#1086;&#1081;&#1090;&#1080;</button>
      <button class="modal-no" onclick="closeModal()">&#1054;&#1090;&#1084;&#1077;&#1085;&#1072;</button>
    </div>
  </div>
</div>

<div class="save-bar admin-bar" style="position:fixed;bottom:24px;right:24px;z-index:9999;background:rgba(10,10,8,0.92);border:1px solid rgba(255,255,255,0.25);">
  <button class="admin-btn" onclick="saveAll()" style="border:none;padding:12px 24px;font-size:10px;">&#128190; Сохранить</button>
</div>

<input type="file" id="global-file-input" accept="image/*" style="display:none;">

<!-- ЛАЙТБОКС -->
<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-img-wrap" id="lightbox-wrap">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div class="lightbox-controls">
    <button class="lightbox-btn" onclick="lightboxZoom(-1)">&#8722;</button>
    <span class="lightbox-zoom-level" id="lightbox-zoom-label">100%</span>
    <button class="lightbox-btn" onclick="lightboxZoom(1)">&#43;</button>
  </div>
</div>

<script src="/shared.js"></script>
<script>
initPage('photo');
</script>
</body>
</html>
